# Theme: catppuccin
# Author: startheme
# Soft, modern pastel palette (Mocha). Segmented layout.

format = """
[](#cba6f7)\
$username\
[](bg:#89b4fa fg:#cba6f7)\
$directory\
[](fg:#89b4fa bg:#a6e3a1)\
$git_branch\
$git_status\
[](fg:#a6e3a1)\
$line_break$character
"""

[username]
show_always = true
style_user = "bg:#cba6f7 fg:#1e1e2e"
format = "[ $user ]($style)"

[directory]
style = "bg:#89b4fa fg:#1e1e2e"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = "bg:#a6e3a1 fg:#1e1e2e"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:#a6e3a1 fg:#1e1e2e"
format = "[$all_status$ahead_behind ]($style)"

[character]
success_symbol = "[>](bold #a6e3a1)"
error_symbol = "[x](bold #f38ba8)"
