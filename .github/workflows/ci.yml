name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest -v

      - name: Verify no emoji in README
        shell: bash
        run: |
          python -c "
          import re, sys
          text = open('README.md', encoding='utf-8').read()
          pattern = re.compile('[\U0001F300-\U0001FAFF\u2600-\u27BF]')
          matches = pattern.findall(text)
          if matches:
              print('Emoji found in README.md:', matches)
              sys.exit(1)
          "

  shellcheck:
    name: Shellcheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck install.sh
