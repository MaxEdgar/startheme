# Theme: gruvbox
# Author: startheme
# Warm, retro, low-contrast. Single line, no powerline separators.

format = """
$username\
$hostname\
$directory \
$git_branch\
$git_status\
$line_break$character
"""

[username]
show_always = true
style_user = "bold #b8bb26"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bold #fabd2f"
format = "[@$hostname]($style) "

[directory]
style = "bold #83a598"
format = "[$path]($style)"
truncation_length = 4
truncate_to_repo = true

[git_branch]
style = "#d3869b"
format = "on [$symbol$branch]($style) "

[git_status]
style = "#fb4934"
format = "[$all_status$ahead_behind]($style) "

[character]
success_symbol = "[>](bold #b8bb26)"
error_symbol = "[x](bold #fb4934)"
