# Theme: minimal
# Author: startheme
# No backgrounds, no separators, no segments. Just color and spacing.
# For people who find powerline styles noisy.

format = """
$directory\
$git_branch\
$git_status\
$character"""

[directory]
style = "bold cyan"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = "bold yellow"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "[$all_status$ahead_behind]($style) "

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
